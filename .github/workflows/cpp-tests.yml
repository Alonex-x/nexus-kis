name: C++ Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt update && sudo apt install -y cmake g++ libx11-dev libssl-dev libsqlite3-dev libgtest-dev
      - name: Build
        run: |
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Debug
          make -j$(nproc)
      - name: Run tests
        run: cd build && ./test_kis
